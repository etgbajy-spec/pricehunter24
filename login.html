  <script>
      // Firebase 초기화 대기
      function waitForFirebase() {
        return new Promise((resolve, reject) => {
          console.log('🔍 Firebase 상태 확인:', {
            firebaseDefined: typeof firebase !== 'undefined',
            firebaseApps: firebase ? firebase.apps.length : 0,
            windowFirebaseApp: !!window.firebaseApp,
            windowFirebaseDb: !!window.firebaseDb,
            windowFirebaseAuth: !!window.firebaseAuth,
            firebaseFirestoreFunctions: !!window.firebaseFirestoreFunctions
          });
          
          if (window.firebaseApp && window.firebaseDb && window.firebaseAuth && window.firebaseFirestoreFunctions) {
            console.log('✅ Firebase v9 준비됨');
            resolve();
          } else {
            const checkInterval = setInterval(() => {
              if (window.firebaseApp && window.firebaseDb && window.firebaseAuth && window.firebaseFirestoreFunctions) {
                clearInterval(checkInterval);
                console.log('✅ Firebase v9 준비됨');
                resolve();
              }
            }, 100);
            
            // 10초 후 타임아웃
            setTimeout(() => {
              clearInterval(checkInterval);
              console.error('❌ Firebase 초기화 타임아웃');
              reject(new Error('Firebase 초기화 실패'));
            }, 10000);
          }
        });
      }

      // 사용자 데이터를 Firebase에서 검색
      async function findUserByEmail(email) {
        try {
          console.log('🔍 Firebase에서 사용자 검색 중:', email);
          await waitForFirebase();
          
          const db = window.firebaseDb;
          const { collection, query, where, getDocs } = window.firebaseFirestoreFunctions;
          const usersRef = collection(db, 'users');
          
          // 이메일로 사용자 검색
          const emailQuery = query(usersRef, where('email', '==', email));
          const emailSnapshot = await getDocs(emailQuery);
          
          if (!emailSnapshot.empty) {
            const userDoc = emailSnapshot.docs[0];
            const userData = userDoc.data();
            console.log('✅ Firebase에서 사용자 찾음:', userData.email);
            return userData;
          }
          
          console.log('❌ Firebase에서 사용자를 찾을 수 없음:', email);
          return null;
        } catch (error) {
          console.error('❌ Firebase 사용자 검색 실패:', error);
          return null;
        }
      }

      // 사용자 데이터 upsert 함수
      async function upsertUser(userData, extra = {}) {
        try {
          await waitForFirebase();
          
          // Firebase Auth 상태 확인
          if (!window.firebaseAuth) {
            console.warn('⚠️ Firebase Auth가 초기화되지 않음 - Firestore 쓰기 건너뜀');
            return { success: false, isNewUser: false, skipped: true };
          }
          
          // 현재 인증된 사용자 확인
          const currentAuthUser = window.firebaseAuth.currentUser;
          
          // Firebase Auth에 로그인하지 않은 경우 Firestore 쓰기 건너뜀
          if (!currentAuthUser) {
            console.warn('⚠️ Firebase Auth에 로그인하지 않음 - Firestore 쓰기 건너뜀 (로컬 스토리지만 사용)');
            return { success: false, isNewUser: false, skipped: true };
          }
          
          // 문서 ID를 Firebase Auth UID로 사용 (보안 규칙과 일치하도록)
          // Firestore 보안 규칙에서 isOwner(userId)는 request.auth.uid == userId를 확인하므로
          // 문서 ID는 반드시 Firebase Auth UID와 일치해야 함
          const finalUid = currentAuthUser.uid;
          
          const { doc, setDoc, getDoc } = window.firebaseFirestoreFunctions;
          const userRef = doc(window.firebaseDb, 'users', finalUid);
          
          // 기존 사용자 문서 존재 여부 확인
          const userDocSnapshot = await getDoc(userRef);
          const isNewUser = !userDocSnapshot.exists();
          
          const userDocData = {
            uid: finalUid,
            email: userData.email || currentAuthUser.email,
            displayName: userData.displayName || userData.name || userData.nickname || currentAuthUser.displayName || '',
            photoURL: userData.photoURL || userData.profileImage || currentAuthUser.photoURL || '',
            loginMethod: userData.loginMethod || 'email',
            createdAt: userData.createdAt || new Date(),
            updatedAt: new Date(),
            isActive: true,
            ...extra
          };
          
          // 문서 설정 (upsert)
          await setDoc(userRef, userDocData, { merge: true });
          console.log('✅ 사용자 데이터 upsert 완료:', userData.email || currentAuthUser.email);
          
          return { success: true, isNewUser, data: userDocData };
        } catch (error) {
          console.error('❌ 사용자 데이터 upsert 실패:', error);
          // 권한 오류인 경우 경고만 표시하고 계속 진행
          if (error.code === 'permission-denied' || error.message?.includes('permissions') || error.message?.includes('Missing or insufficient permissions')) {
            console.warn('⚠️ Firestore 권한 오류 - 로컬 스토리지만 사용합니다');
            return { success: false, isNewUser: false, skipped: true };
          }
          throw error;
        }
      }

      // 입력값 검증
      function validateInput(value, type) {
        if (!value || value.trim() === '') return false;
        
        switch (type) {
          case 'email':
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(value.trim());
          case 'password':
            return value.length >= 6;
          default:
            return true;
        }
      }

      // 입력값 정리
      function sanitizeInput(input) {
        return input.trim().replace(/[<>]/g, '');
      }

      // 토스트 메시지 표시
      function showToast(message, type = 'info') {
        // 간단한 토스트 구현
        const toast = document.createElement('div');
        toast.className = `fixed top-4 right-4 px-6 py-3 rounded-lg text-white z-50 ${
          type === 'success' ? 'bg-green-500' : 
          type === 'error' ? 'bg-red-500' : 
          'bg-blue-500'
        }`;
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
          document.body.removeChild(toast);
        }, 3000);
      }

      // 로그인 시도 제한
      let loginAttempts = 0;
      const maxLoginAttempts = 5;
      let lockoutTime = 0;
      
      function canAttemptLogin() {
        const now = Date.now();
        if (lockoutTime > now) {
          const remainingTime = Math.ceil((lockoutTime - now) / 1000 / 60);
          showToast(`로그인 시도가 제한되었습니다. ${remainingTime}분 후 다시 시도해주세요.`, 'error');
          return false;
        }
        return true;
      }
      
      function recordLoginAttempt(success) {
        if (success) {
          loginAttempts = 0;
          lockoutTime = 0;
        } else {
          loginAttempts++;
          if (loginAttempts >= maxLoginAttempts) {
            lockoutTime = Date.now() + (15 * 60 * 1000); // 15분 제한
            showToast('로그인 시도가 너무 많습니다. 15분 후 다시 시도해주세요.', 'error');
          }
        }
      }

      const KAKAO_REST_API_KEY = '1d998d95218190a7ee03d06314b49951';
      let kakaoCallbackProcessing = false;

      function getKakaoRedirectUri() {
        const host = window.location.hostname;
        const origin = (host === 'localhost' || host === '127.0.0.1')
          ? window.location.origin
          : 'https://pricehunt24.com';
        return origin + '/login.html';
      }

      function stripKakaoCodeFromUrl() {
        try {
          const params = new URLSearchParams(window.location.search);
          params.delete('code');
          params.delete('state');
          const query = params.toString();
          window.history.replaceState({}, document.title, window.location.pathname + (query ? '?' + query : ''));
        } catch (error) {
          console.warn('카카오 URL 정리 실패:', error);
        }
      }

      function startKakaoLogin() {
        const button = document.getElementById('kakao-login');
        const text = document.getElementById('kakao-login-text');
        if (button) button.disabled = true;
        if (text) text.textContent = '카카오로 이동 중...';

        const authParams = new URLSearchParams({
          client_id: KAKAO_REST_API_KEY,
          redirect_uri: getKakaoRedirectUri(),
          response_type: 'code',
          scope: 'profile_nickname,account_email',
        });
        window.location.href = 'https://kauth.kakao.com/oauth/authorize?' + authParams.toString();
      }

      async function finalizeKakaoLogin(firebaseUser, kakaoProfile, isNewUser) {
        const userData = {
          uid: firebaseUser.uid,
          email: kakaoProfile.email || '',
          displayName: kakaoProfile.displayName || '',
          photoURL: kakaoProfile.photoURL || '',
          loginMethod: 'kakao',
        };

        await waitForFirebase();
        const { doc, getDoc } = window.firebaseFirestoreFunctions;
        const userRef = doc(window.firebaseDb, 'users', firebaseUser.uid);
        const userDoc = await getDoc(userRef);
        const needsProfile = !userDoc.exists() || !userDoc.data()?.name || !userDoc.data()?.phone;

        if (needsProfile) {
          localStorage.setItem('loggedIn', 'true');
          localStorage.setItem('currentUser', JSON.stringify(userData));
          localStorage.setItem('user', JSON.stringify(userData));
          if (userData.email) localStorage.setItem('loggedInEmail', userData.email);
          window.location.href = 'complete-profile.html';
          return;
        }

        await upsertUser(userData, { lastLogin: new Date() });
        localStorage.setItem('loggedIn', 'true');
        localStorage.setItem('currentUser', JSON.stringify(userData));
        localStorage.setItem('user', JSON.stringify(userData));
        if (userData.email) localStorage.setItem('loggedInEmail', userData.email);

        showToast(isNewUser ? '카카오 회원가입이 완료되었습니다!' : '카카오 로그인 성공!', 'success');
        setTimeout(function() {
          window.location.href = 'index.html';
        }, 800);
      }

      async function handleKakaoAuthCallback(code) {
        if (!code || kakaoCallbackProcessing) return;
        kakaoCallbackProcessing = true;

        const button = document.getElementById('kakao-login');
        const text = document.getElementById('kakao-login-text');
        if (button) button.disabled = true;
        if (text) text.textContent = '카카오 로그인 처리 중...';
        stripKakaoCodeFromUrl();

        try {
          await waitForFirebase();
          const response = await fetch('/api/kakao-to-firebase-token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code, redirectUri: getKakaoRedirectUri() }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || '카카오 로그인에 실패했습니다.');
          }

          const credential = await window.firebaseAuthFunctions.signInWithCustomToken(
            window.firebaseAuth,
            data.customToken || data.token
          );
          await finalizeKakaoLogin(credential.user, data.user, data.isNewUser);
        } catch (error) {
          console.error('❌ 카카오 로그인 실패:', error);
          if (button) button.disabled = false;
          if (text) text.textContent = '카카오로 로그인';
          showToast(error.message || '카카오 로그인에 실패했습니다.', 'error');
        } finally {
          kakaoCallbackProcessing = false;
        }
      }

      // 이벤트 리스너 등록
      document.addEventListener('DOMContentLoaded', function() {
        console.log('🚀 login.html v1.0 로드됨');
        
        // 로그인 폼 제출
        document.getElementById('login-form').addEventListener('submit', async function(e) {
          e.preventDefault();
          
          const loginStartTime = performance.now();
          console.log('🚀 로그인 프로세스 시작');
          
          const email = sanitizeInput(document.getElementById('email').value.trim());
          const password = document.getElementById('password').value;
          
          // 입력값 검증
          if (!validateInput(email, 'email')) {
            showToast('올바른 이메일 주소를 입력해주세요', 'error');
            return;
          }
          
          if (!validateInput(password, 'password')) {
            showToast('비밀번호를 올바르게 입력해주세요', 'error');
            return;
          }
          
          // 로그인 시도 제한 확인
          if (!canAttemptLogin()) {
            return;
          }
          
          // 로그인 버튼 비활성화
          const loginButton = document.getElementById('login-button');
          loginButton.disabled = true;
          loginButton.textContent = '로그인 중...';
          loginButton.classList.add('loading');
          
          try {
            await waitForFirebase();
            
            if (!window.firebaseAuthFunctions?.signInWithEmailAndPassword || !window.firebaseAuth) {
              throw new Error('Firebase Auth가 초기화되지 않았습니다.');
            }
            
            console.log('🔍 Firebase Auth 로그인 시도:', email);
            
            // Firebase Auth로 이메일/비밀번호 로그인
            const userCredential = await window.firebaseAuthFunctions.signInWithEmailAndPassword(
              window.firebaseAuth,
              email,
              password
            );
            
            const firebaseUser = userCredential.user;
            console.log('✅ Firebase Auth 로그인 성공:', firebaseUser.email);
            
            // Firestore에서 사용자 추가 정보 가져오기
            const { doc, getDoc } = window.firebaseFirestoreFunctions;
            const userRef = doc(window.firebaseDb, 'users', firebaseUser.uid);
            const userDoc = await getDoc(userRef);
            
            const userData = {
              uid: firebaseUser.uid,
              email: firebaseUser.email,
              displayName: firebaseUser.displayName || (userDoc.exists() ? userDoc.data().displayName : '') || '',
              photoURL: firebaseUser.photoURL || (userDoc.exists() ? userDoc.data().photoURL : '') || '',
              loginMethod: 'email'
            };

            // Firestore에 사용자 데이터 upsert (로그인 정보 업데이트)
            const upsertResult = await upsertUser(userData, {
              lastLogin: new Date(),
              loginCount: (userDoc.exists() ? (userDoc.data().loginCount || 0) : 0) + 1
            });

            // 로컬 스토리지에 로그인 정보 저장
            localStorage.setItem('loggedIn', 'true');
            localStorage.setItem('currentUser', JSON.stringify(userData));
            localStorage.setItem('user', JSON.stringify(userData)); // 마이페이지 호환성
            localStorage.setItem('loggedInEmail', userData.email);
            
            const totalLoginTime = performance.now() - loginStartTime;
            console.log(`🎉 로그인 성공! 총 소요시간: ${totalLoginTime.toFixed(2)}ms`);
            recordLoginAttempt(true);
            showToast(`로그인 성공! (${totalLoginTime.toFixed(0)}ms)`, 'success');
            
            // 메인 페이지로 리다이렉트
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 1000);
            
          } catch (error) {
            console.error('❌ Firebase Auth 로그인 실패:', error);
            document.getElementById('login-error').classList.remove('hidden');
            recordLoginAttempt(false);
            
            // 에러 메시지 처리
            let errorMessage = '로그인에 실패했습니다.';
            if (error.code === 'auth/user-not-found') {
              errorMessage = '등록되지 않은 이메일입니다. 회원가입을 먼저 진행해주세요.';
            } else if (error.code === 'auth/wrong-password') {
              errorMessage = '비밀번호가 올바르지 않습니다.';
            } else if (error.code === 'auth/invalid-email') {
              errorMessage = '올바른 이메일 주소를 입력해주세요.';
            } else if (error.code === 'auth/too-many-requests') {
              errorMessage = '너무 많은 로그인 시도가 있었습니다. 잠시 후 다시 시도해주세요.';
            } else if (error.message) {
              errorMessage = error.message;
            }
            
            showToast(errorMessage, 'error');
          } finally {
            // 로그인 버튼 활성화
            loginButton.disabled = false;
            loginButton.textContent = '로그인';
            loginButton.classList.remove('loading');
          }
        });
        
        // 테스트 사용자 생성 버튼
        document.getElementById('create-test-user').addEventListener('click', async function() {
          const testEmail = 'test@example.com';
          const testPassword = '123456';
          
          try {
            await waitForFirebase();
            
            const db = window.firebaseDb;
            const { collection, addDoc, serverTimestamp } = window.firebaseFirestoreFunctions;
            const usersRef = collection(db, 'users');
            
            // 테스트 사용자 데이터
            const testUserData = {
              uid: `email_${testEmail.replace('@', '_').replace('.', '_')}`,
              email: testEmail,
              name: '테스트 사용자',
              displayName: '테스트 사용자',
              phone: '010-1234-5678',
              password: testPassword,
              emailVerification: testEmail,
              agreeTerms: true,
              agreePrivacy: true,
              agreeMarketing: false,
              loginMethod: 'email',
              isActive: true,
              createdAt: serverTimestamp(),
              updatedAt: serverTimestamp()
            };
            
            // 중복 확인
            const { query, where, getDocs } = window.firebaseFirestoreFunctions;
            const emailQuery = query(usersRef, where('email', '==', testEmail));
            const emailSnapshot = await getDocs(emailQuery);
            
            if (!emailSnapshot.empty) {
              showToast('테스트 사용자가 이미 존재합니다.', 'info');
              return;
            }
            
            // 테스트 사용자 생성
            await addDoc(usersRef, testUserData);
            
            showToast('테스트 사용자가 생성되었습니다!\n이메일: test@example.com\n비밀번호: 123456', 'success');
            
            // 폼에 테스트 데이터 입력
            document.getElementById('email').value = testEmail;
            document.getElementById('password').value = testPassword;
            
          } catch (error) {
            console.error('테스트 사용자 생성 실패:', error);
            showToast('테스트 사용자 생성에 실패했습니다.', 'error');
          }
        });

        const kakaoLoginButton = document.getElementById('kakao-login');
        if (kakaoLoginButton) {
          kakaoLoginButton.addEventListener('click', function(e) {
            e.preventDefault();
            startKakaoLogin();
          });
        }

        const urlParams = new URLSearchParams(window.location.search);
        const kakaoAuthCode = urlParams.get('code');
        if (kakaoAuthCode) {
          handleKakaoAuthCallback(kakaoAuthCode);
        }
      });
  </script>
  <script src="visit-tracker.js" defer></script>
