    <script>
      // 서버에서 결제 정보 조회 (URL에는 req만 전달, 금액·상품명·원산지는 서버에서 확정)
      let paymentInfoFromServer = null;
      function formatKrw(amount) {
        const n = Number(amount);
        if (!Number.isFinite(n)) return '';
        return '₩' + n.toLocaleString();
      }
      function normalizeCustomsId(v) {
        return String(v || '').trim().toUpperCase().replace(/\s+/g, '');
      }
      function isValidCustomsId(v) {
        return /^P\d{12}$/.test(normalizeCustomsId(v));
      }
      function openAddressSearch() {
        if (!window.daum || !window.daum.Postcode) {
          alert('주소 검색 모듈을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.');
          return;
        }
        new window.daum.Postcode({
          oncomplete: function(data) {
            const address = data.roadAddress || data.jibunAddress || '';
            const addressEl = document.getElementById('shipping-address');
            const detailEl = document.getElementById('shipping-address-detail');
            if (addressEl) addressEl.value = address;
            if (detailEl) detailEl.focus();
          }
        }).open();
      }
      async function getProductInfo() {
        const urlParams = new URLSearchParams(window.location.search);
        let reqKey = urlParams.get('req') || (window.location.href.split('?')[1] || '').split('&').find(p => p.startsWith('req='))?.split('=')[1];
        // 주소창에 ?req=#PH-xxx 로 넣으면 # 뒤는 fragment라 빈 값이 됨 → hash에서 읽기
        if ((!reqKey || !reqKey.trim()) && window.location.hash) {
          reqKey = window.location.hash.replace(/^#+/, '').trim();
        }
        if (reqKey) reqKey = reqKey.replace(/^#+/, '');
        if (!reqKey || !reqKey.trim()) {
          alert('상품 정보를 불러올 수 없습니다. 의뢰 번호가 필요합니다.');
          return;
        }
        try {
          const base = window.location.origin;
          const res = await fetch(base + '/api/payment-info?req=' + encodeURIComponent(reqKey.trim()));
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            alert(data.error || '상품 정보를 불러올 수 없습니다.');
            return;
          }
          const name = data.name || '상품';
          const origin = data.origin || '정보 없음';
          const method = data.method === 'support' ? 'support' : 'direct';
          const requestPrice = data.requestPrice != null ? Number(data.requestPrice) : null;
          const finalPrice = Number(data.finalPrice);
          if (isNaN(finalPrice) || finalPrice <= 0) {
            alert('유효한 결제 금액을 확인할 수 없습니다.');
            return;
          }
          paymentInfoFromServer = { reqKey: reqKey.trim(), name, requestPrice, finalPrice, origin, method };
          const productNameEl = document.getElementById('product-name');
          const productOriginEl = document.getElementById('product-origin');
          const requestPriceEl = document.getElementById('request-price');
          const finalPriceEl = document.getElementById('final-price');
          const subtotalEl = document.getElementById('subtotal');
          const totalAmountEl = document.getElementById('total-amount');
          const purchaseMethodEl = document.getElementById('purchase-method');
          if (productNameEl) productNameEl.textContent = name;
          if (productOriginEl) productOriginEl.textContent = origin;
          if (requestPriceEl) requestPriceEl.textContent = requestPrice != null && Number.isFinite(requestPrice) && requestPrice > 0 ? formatKrw(requestPrice) : '정보 없음';
          const finalStr = formatKrw(finalPrice);
          if (finalPriceEl) finalPriceEl.textContent = finalStr;
          if (subtotalEl) subtotalEl.textContent = finalStr;
          if (totalAmountEl) totalAmountEl.textContent = finalStr;
          if (purchaseMethodEl) purchaseMethodEl.textContent = method === 'support' ? '구매 대행 지원 서비스' : '직접 구매';
          const requestKey = 'request-' + reqKey;
          const requestData = localStorage.getItem(requestKey);
          if (requestData) {
            try {
              const request = JSON.parse(requestData);
              const recipientNameElement = document.getElementById('recipient-name');
              const payerNameElement = document.getElementById('payer-name');
              const recipientPhoneElement = document.getElementById('recipient-phone');
              const payerPhoneElement = document.getElementById('payer-phone');
              const payerEmailElement = document.getElementById('payer-email');
              if (request.userName && recipientNameElement) recipientNameElement.value = request.userName;
              if (request.userName && payerNameElement) payerNameElement.value = request.userName;
              if (request.phone && recipientPhoneElement) recipientPhoneElement.value = request.phone;
              if (request.phone && payerPhoneElement) payerPhoneElement.value = request.phone;
              if (request.email && payerEmailElement) payerEmailElement.value = request.email;
            } catch (e) {}
          }
        } catch (err) {
          console.error(err);
          alert('상품 정보를 불러오는 중 오류가 발생했습니다.');
        }
      }

      // 결제 처리
      async function processPayment() {
        // 필수 입력 검증
        const requiredFields = [
          'recipient-name', 'recipient-phone', 'shipping-address', 'shipping-address-detail',
          'payer-name', 'payer-phone', 'payer-email'
        ];

        for (const fieldId of requiredFields) {
          const field = document.getElementById(fieldId);
          if (!field.value.trim()) {
            alert('필수 입력 항목을 모두 입력해주세요.');
            field.focus();
            return;
          }
        }

        const customsIdEl = document.getElementById('customs-id');
        if (!customsIdEl || !customsIdEl.value.trim()) {
          alert('통관고유번호를 입력해주세요.');
          customsIdEl?.focus();
          return;
        }
        if (!isValidCustomsId(customsIdEl.value)) {
          alert('통관고유번호 형식이 올바르지 않습니다. (예: P123456789012)');
          customsIdEl.focus();
          return;
        }

        if (!document.getElementById('agree-terms').checked) {
          alert('구매조건 및 개인정보처리방침에 동의해주세요.');
          return;
        }

        // 결제 방법 확인
        const paymentMethod = document.querySelector('input[name="payment-method"]:checked');
        if (!paymentMethod) {
          alert('결제 방법을 선택해주세요.');
          return;
        }

        if (!paymentInfoFromServer) {
          alert('상품 정보를 먼저 불러와 주세요.');
          return;
        }
        const productName = paymentInfoFromServer.name;
        const reqId = paymentInfoFromServer.reqKey;
        const amount = paymentInfoFromServer.finalPrice;

        // 결제 버튼 비활성화
        const paymentBtn = document.getElementById('payment-btn');
        paymentBtn.disabled = true;
        paymentBtn.textContent = '결제 처리 중...';

        try {
          if (!window.IMP) {
            throw new Error('결제 모듈(PortOne)을 불러오지 못했습니다.');
          }

          const impCode = window.PORTONE_IMP_CODE || '';
          if (!impCode) {
            alert('결제 설정이 완료되지 않았습니다. (window.PORTONE_IMP_CODE)');
            paymentBtn.disabled = false;
            paymentBtn.textContent = '결제하기';
            return;
          }
          window.IMP.init(impCode);

          const merchantUid = `PH__${reqId}__${Date.now()}`;
          const buyerName = document.getElementById('payer-name').value.trim();
          const buyerEmail = document.getElementById('payer-email').value.trim();
          const buyerTel = document.getElementById('payer-phone').value.trim();
          const recipientName = document.getElementById('recipient-name').value.trim();
          const recipientPhone = document.getElementById('recipient-phone').value.trim();
          const baseAddress = document.getElementById('shipping-address').value.trim();
          const detailAddress = document.getElementById('shipping-address-detail').value.trim();
          const fullAddress = `${baseAddress} ${detailAddress}`.trim();
          const customsId = normalizeCustomsId(document.getElementById('customs-id').value);
          const shippingNote = document.getElementById('shipping-note').value.trim();

          if (!window.PORTONE_CHANNEL_KEY) {
            alert('결제 채널 설정이 필요합니다. (window.PORTONE_CHANNEL_KEY)');
            paymentBtn.disabled = false;
            paymentBtn.textContent = '결제하기';
            return;
          }
          if (!window.GALAXIA_ITEM_CODE) {
            alert('Galaxia 상품코드 설정이 필요합니다. (window.GALAXIA_ITEM_CODE)');
            paymentBtn.disabled = false;
            paymentBtn.textContent = '결제하기';
            return;
          }

          localStorage.setItem(`order-${merchantUid}`, JSON.stringify({
            merchantUid,
            reqId,
            productName,
            amount,
            payer: { name: buyerName, email: buyerEmail, phone: buyerTel },
            recipient: { name: recipientName, phone: recipientPhone, address: fullAddress, customsId },
            shippingNote,
            createdAt: Date.now()
          }));

          window.IMP.request_pay({
            channelKey: window.PORTONE_CHANNEL_KEY,
            pay_method: (function() {
              const selected = paymentMethod.value;
              if (selected === 'bank') return 'trans';
              if (selected === 'kakao') return 'kakaopay';
              if (selected === 'naver') return 'naverpay';
              return 'card';
            })(),
            merchant_uid: merchantUid,
            name: productName,
            amount,
            customer_id: (buyerEmail || buyerTel || reqId).slice(0, 20),
            m_redirect_url: window.location.origin + '/payment-success.html',
            buyer_name: buyerName,
            buyer_tel: buyerTel,
            buyer_email: buyerEmail,
            buyer_addr: fullAddress,
            custom_data: {
              reqId,
              recipientName,
              recipientPhone,
              shippingAddress: fullAddress,
              shippingNote,
              customsId
            },
            bypass: {
              galaxia: {
                ITEM_CODE: window.GALAXIA_ITEM_CODE
              }
            },
          }, function(rsp) {
            if (rsp && rsp.success) {
              const qs = new URLSearchParams({
                imp_uid: rsp.imp_uid || '',
                merchant_uid: merchantUid,
                req: reqId
              });
              window.location.href = `payment-success.html?${qs.toString()}`;
              return;
            }
            console.error('결제 실패:', rsp);
            const msg = (rsp && (rsp.error_msg || rsp.error_msg)) ? (rsp.error_msg || rsp.error_msg) : '결제에 실패했습니다.';
            alert(msg);
            window.location.href = `payment-fail.html?orderId=${encodeURIComponent(merchantUid)}&req=${encodeURIComponent(reqId)}`;
          });

          return;
        } catch (error) {
          console.error('❌ 주문 생성 실패:', error);
          alert('결제 준비에 실패했습니다. 잠시 후 다시 시도해주세요.');
          paymentBtn.disabled = false;
          paymentBtn.textContent = '결제하기';
          return;
        }
      }

      // 페이지 로드 시 상품 정보 한 번만 요청 (중복 호출 시 rate limit에 걸리지 않도록)
      let productInfoRequested = false;
      function ensureProductInfo() {
        if (productInfoRequested) return;
        productInfoRequested = true;
        getProductInfo();
      }
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(ensureProductInfo, 100);
      });
      window.addEventListener('load', function() {
        setTimeout(function() {
          if (!document.getElementById('product-name').textContent) {
            productInfoRequested = false;
            ensureProductInfo();
          }
        }, 300);
      });
    </script>
  </body>
</html>
