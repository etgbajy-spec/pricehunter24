  <!-- Firebase v9 SDK (모듈식) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
    import { getAuth, signInWithCustomToken, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, getAdditionalUserInfo } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, onSnapshot, addDoc, serverTimestamp, getDocs, where, deleteDoc } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';
    
    // Firebase 설정
    const firebaseConfig = {
      apiKey: "AIzaSyDBZxKyMS7eeBTbPnbZkj0WWOZQHNldoL4",
      authDomain: "pricehunter-99a1b.firebaseapp.com",
      projectId: "pricehunter-99a1b",
      storageBucket: "pricehunter-99a1b.firebasestorage.app",
      messagingSenderId: "242265693919",
      appId: "1:242265693919:web:74234d942b82a51541136a",
      measurementId: "G-4BKLV4EVB9"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 전역 변수로 노출
    window.firebaseApp = app;
    window.firebaseAuth = auth;
    window.firebaseDb = db;
    window.firebaseAuthFunctions = { signInWithPopup, signInWithRedirect, getRedirectResult, getAdditionalUserInfo };
    window.firebaseFirestoreFunctions = { 
      collection, 
      addDoc, 
      serverTimestamp, 
      getDocs, 
      where, 
      query, 
      deleteDoc,
      getDoc,
      doc,
      setDoc
    };
    const googleProvider = new GoogleAuthProvider();
    googleProvider.setCustomParameters({ prompt: 'select_account' });
    window.firebaseGoogleProvider = googleProvider;
    window.firebase = {
      firestore: () => db,
      auth: () => auth,
      apps: [app],
      app: () => app,
      firestore: {
        FieldValue: {
          serverTimestamp: serverTimestamp
        }
      }
    };

    console.log('✅ Firebase v9 초기화 완료 (register.html)');
    
    // Firebase 준비 완료 플래그 설정
    window.isFirebaseReady = false;
    
    // Firebase 준비 완료 시 버튼 활성화 함수
    function enableGoogleRegisterButton() {
      const button = document.getElementById('google-register');
      const text = document.getElementById('google-register-text');
      const loading = document.getElementById('google-register-loading');
      
      if (button && text) {
        button.disabled = false;
        button.classList.remove('bg-gray-100', 'text-gray-400', 'cursor-not-allowed');
        button.classList.add('bg-white', 'text-gray-700', 'hover:border-gray-300');
        text.textContent = 'Google 계정으로 가입하기';
        window.isFirebaseReady = true;
        
        // 로딩 인디케이터 숨기기
        if (loading) {
          loading.style.display = 'none';
        }
        
        console.log('✅ 구글 회원가입 버튼 활성화 완료');
      }
    }
    
    // Firebase 준비 상태 확인 및 버튼 활성화
    function checkFirebaseReady() {
      if (window.firebaseApp && window.firebaseDb && window.firebaseAuth && 
          window.firebaseFirestoreFunctions && window.firebaseGoogleProvider) {
        enableGoogleRegisterButton();
        return true;
      }
      return false;
    }
    
    // 즉시 확인 (이미 준비된 경우)
    if (checkFirebaseReady()) {
      console.log('✅ Firebase 즉시 준비 완료');
    } else {
      // 준비될 때까지 대기
      const readyCheck = setInterval(() => {
        if (checkFirebaseReady()) {
          clearInterval(readyCheck);
        }
      }, 100);
      
      // 10초 후 타임아웃
      setTimeout(() => {
        clearInterval(readyCheck);
        const button = document.getElementById('google-register');
        const text = document.getElementById('google-register-text');
        const loading = document.getElementById('google-register-loading');
        
        if (button && text && button.disabled) {
          button.disabled = false;
          button.classList.remove('bg-gray-100', 'text-gray-400', 'cursor-not-allowed');
          button.classList.add('bg-white', 'text-gray-700', 'hover:border-gray-300');
          text.textContent = 'Google 계정으로 가입하기';
          
          // 로딩 인디케이터 숨기기
          if (loading) {
            loading.style.display = 'none';
          }
          
          const hint = document.getElementById('google-register-hint');
          if (hint) {
            hint.textContent = '⚠️ 로그인 준비가 완료되지 않았을 수 있습니다. 다시 시도해주세요.';
            hint.classList.remove('text-blue-600');
            hint.classList.add('text-orange-600');
          }
          console.warn('⚠️ Firebase 준비 타임아웃, 버튼 강제 활성화');
        }
      }, 10000);
    }
    
    // 구글 리디렉션 결과 처리 (팝업만 사용하므로 리디렉션 처리 불필요)
    // 하지만 index.html과의 호환성을 위해 유지 (리디렉션 사용 안 함)
    async function handleGoogleRedirectResult() {
      try {
        if (!window.firebaseAuthFunctions?.getRedirectResult || !window.firebaseAuth) {
          return;
        }
        
        const redirectResult = await window.firebaseAuthFunctions.getRedirectResult(window.firebaseAuth);
        if (redirectResult && redirectResult.user) {
          const additionalInfo = window.firebaseAuthFunctions.getAdditionalUserInfo 
            ? window.firebaseAuthFunctions.getAdditionalUserInfo(redirectResult)
            : null;
          window.pendingGoogleResult = {
            user: redirectResult.user,
            additionalInfo
          };
          console.log('✅ 구글 리디렉션 로그인 결과 확보:', redirectResult.user.email);
        }
      } catch (error) {
        if (error?.code === 'auth/no-auth-event') {
          return;
        }
        console.error('❌ 구글 리디렉션 처리 실패:', error);
        window.pendingGoogleRedirectError = error;
      }
    }
    
    // Firebase 초기화 후 리디렉션 결과 확인 (팝업만 사용하므로 대부분 null 반환)
    handleGoogleRedirectResult();
  </script>

    </div>
  </main>

  <script>
      // 이메일 인증 + 휴대폰 번호를 사용하는 회원가입

      // 전역 변수
      let isEmailVerified = false;
      
      // 구글 회원가입 함수는 아래에서 정의되고 바로 전역으로 노출됨

      // Firebase 초기화 대기
      function waitForFirebase() {
        return new Promise((resolve, reject) => {
          console.log('🔍 Firebase 상태 확인:', {
            firebaseDefined: typeof firebase !== 'undefined',
            firebaseApps: firebase ? firebase.apps.length : 0,
            windowFirebaseApp: !!window.firebaseApp,
            windowFirebaseDb: !!window.firebaseDb,
            windowFirebaseAuth: !!window.firebaseAuth,
            firebaseFirestoreFunctions: !!window.firebaseFirestoreFunctions
          });
          
          if (window.firebaseApp && window.firebaseDb && window.firebaseAuth && window.firebaseFirestoreFunctions) {
            console.log('✅ Firebase v9 준비됨');
            resolve();
          } else {
            const checkInterval = setInterval(() => {
              if (window.firebaseApp && window.firebaseDb && window.firebaseAuth && window.firebaseFirestoreFunctions) {
                clearInterval(checkInterval);
                console.log('✅ Firebase v9 준비됨');
                resolve();
              }
            }, 100);
            
            // 10초 후 타임아웃
            setTimeout(() => {
              clearInterval(checkInterval);
              console.error('❌ Firebase 초기화 타임아웃');
              reject(new Error('Firebase 초기화 실패'));
            }, 10000);
          }
        });
      }

      // 사용자 데이터를 Firebase에 저장
    async function saveUserToFirebase(userData) {
      try {
          console.log('⏳ Firebase 대기 중...');
          await waitForFirebase();
          console.log('✅ Firebase 준비 완료');
          
          const db = window.firebaseDb;
          const { collection, query, where, getDocs, addDoc, setDoc, doc, serverTimestamp } = window.firebaseFirestoreFunctions;
          const usersRef = collection(db, 'users');
          console.log('📊 Firebase Firestore 연결 완료');
          
          // 이메일 중복 확인 (Firebase)
          console.log('🔍 Firebase에서 이메일 중복 확인 중...', userData.email);
          const emailQuery = query(usersRef, where('email', '==', userData.email));
          const emailSnapshot = await getDocs(emailQuery);
          console.log('📋 Firebase 이메일 중복 확인 결과:', emailSnapshot.empty ? '중복 없음' : '중복 발견');
          if (!emailSnapshot.empty) {
            throw new Error('이미 가입된 이메일입니다.');
          }
          
          // 휴대폰 번호 중복 확인 (Firebase)
          console.log('🔍 Firebase에서 휴대폰 번호 중복 확인 중...', userData.phone);
          const phoneQuery = query(usersRef, where('phone', '==', userData.phone));
          const phoneSnapshot = await getDocs(phoneQuery);
          console.log('📋 Firebase 휴대폰 중복 확인 결과:', phoneSnapshot.empty ? '중복 없음' : '중복 발견');
          if (!phoneSnapshot.empty) {
            throw new Error('이미 가입된 휴대폰 번호입니다.');
          }
          
          // localStorage에서도 중복 확인
          console.log('🔍 localStorage에서 이메일 중복 확인 중...', userData.email);
          const existingUsers = JSON.parse(localStorage.getItem('users') || '[]');
          const duplicateEmail = existingUsers.find(user => user.email === userData.email);
          if (duplicateEmail) {
            throw new Error('이미 가입된 이메일입니다.');
          }
          
          console.log('🔍 localStorage에서 휴대폰 번호 중복 확인 중...', userData.phone);
          const duplicatePhone = existingUsers.find(user => user.phone === userData.phone);
          if (duplicatePhone) {
            throw new Error('이미 가입된 휴대폰 번호입니다.');
          }
          console.log('📋 localStorage 중복 확인 결과: 중복 없음');
          
          // 사용자 데이터 저장 (일관된 형식으로)
          console.log('💾 Firebase에 사용자 데이터 저장 중...');
          // Firebase Auth를 사용하지 않는 경우를 위한 임시 uid 생성
          // 하지만 실제로는 Firebase Auth를 사용하는 것이 권장됨
          const uid = `email_${userData.email.replace('@', '_').replace('.', '_')}`;
          
          // 문서 ID를 uid로 설정하여 일관성 유지 (setDoc 사용)
          // doc와 setDoc는 이미 위에서 선언됨 (630번 줄)
          const userDocRef = doc(db, 'users', uid);
          
          await setDoc(userDocRef, {
            uid: uid,
            email: userData.email,
            name: userData.name.trim(), // 이름 공백 제거
            displayName: userData.name.trim(), // 이름 공백 제거
            phone: userData.phone,
            password: userData.password,
            emailVerification: userData.emailVerification,
            agreeTerms: userData.agreeTerms,
            agreePrivacy: userData.agreePrivacy,
            agreeMarketing: userData.agreeMarketing,
            loginMethod: 'email',
            isActive: true,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          }, { merge: true });
          
          console.log('✅ Firebase에 사용자 저장 완료:', uid);
          return uid;
      } catch (error) {
          console.error('❌ Firebase 저장 실패:', error);
          
          // Firebase 저장 실패 시 오류 메시지와 함께 throw
          if (error.message.includes('Missing or insufficient permissions') || 
              error.message.includes('permission-denied')) {
            throw new Error('Firebase 권한 오류가 발생했습니다. 관리자에게 문의하세요.');
          }
          
          // 다른 오류는 그대로 throw
          throw error;
        }
      }

      // localStorage에 사용자 데이터 저장
      function saveUserToLocalStorage(userData) {
        // localStorage 저장 제거 - Firebase 전용
        console.log('✅ Firebase에만 사용자 데이터 저장');
        }
        
        // 포인트 추가
      // 포인트 시스템 제거됨

      // 사용자 데이터 upsert 함수 (모든 로그인 경로에서 공통 사용)
      async function upsertUser(userData, extra = {}) {
        try {
          await waitForFirebase();
          
          const { doc, setDoc, getDoc } = window.firebaseFirestoreFunctions;
          const userRef = doc(window.firebaseDb, 'users', userData.uid);
          
          // 기존 사용자 문서 존재 여부 확인
          const userDocSnapshot = await getDoc(userRef);
          const isNewUser = !userDocSnapshot.exists();
          
          const userDoc = {
            uid: userData.uid,
            email: userData.email,
            displayName: userData.displayName || userData.name || userData.nickname || '',
            photoURL: userData.photoURL || userData.profileImage || '',
            loginMethod: userData.loginMethod || 'email',
            createdAt: userData.createdAt || new Date(),
            updatedAt: new Date(),
            isActive: true,
            ...extra
          };

          await setDoc(userRef, userDoc, { merge: true });
          console.log('✅ 사용자 데이터 upsert 완료:', userData.email);
          return { success: true, isNewUser };
        } catch (error) {
          console.error('❌ 사용자 데이터 upsert 실패:', error);
          return { success: false, isNewUser: false };
        }
      }

      async function finalizeSocialLogin(firebaseUser, options = {}) {
        if (!firebaseUser) return;
        
        const additionalInfo = options.additionalInfo || {};
        const providerData = firebaseUser.providerData?.[0] || {};
        const userData = {
          uid: firebaseUser.uid,
          email: firebaseUser.email || '',
          displayName: firebaseUser.displayName || providerData.displayName || firebaseUser.email?.split('@')[0] || '',
          photoURL: firebaseUser.photoURL || providerData.photoURL || '',
          phoneNumber: firebaseUser.phoneNumber || providerData.phoneNumber || '',
          loginMethod: options.loginMethod || providerData.providerId || 'google',
          emailVerified: firebaseUser.emailVerified,
          createdAt: firebaseUser.metadata?.creationTime ? new Date(firebaseUser.metadata.creationTime) : new Date(),
          updatedAt: new Date()
        };
        
        // 새 사용자인지 확인 (upsertUser 호출 전에 확인)
        await waitForFirebase();
        const { doc, getDoc } = window.firebaseFirestoreFunctions;
        const userRefBeforeUpsert = doc(window.firebaseDb, 'users', firebaseUser.uid);
        const userDocBeforeUpsert = await getDoc(userRefBeforeUpsert);
        const isNewUserBeforeUpsert = !userDocBeforeUpsert.exists();
        
        // 구글 로그인 사용자의 경우 이름과 핸드폰번호 확인 (upsertUser 전에)
        let needsProfile = false;
        if (options.loginMethod === 'google' || providerData.providerId === 'google.com') {
          if (userDocBeforeUpsert.exists()) {
            const existingData = userDocBeforeUpsert.data();
            // 이름이나 핸드폰번호가 없으면 프로필 완성 페이지로 이동
            if (!existingData.name || !existingData.phone) {
              needsProfile = true;
            }
          } else {
            // 새 사용자는 무조건 프로필 완성 필요
            needsProfile = true;
          }
        }
        
        // 프로필 완성이 필요한 경우 upsertUser 호출하지 않고 바로 이동
        if (needsProfile) {
          // 최소한의 사용자 정보만 localStorage에 저장 (프로필 완성 페이지에서 사용)
          localStorage.setItem('loggedIn', 'true');
          localStorage.setItem('currentUser', JSON.stringify(userData));
          localStorage.setItem('user', JSON.stringify(userData));
          if (userData.email) {
            localStorage.setItem('loggedInEmail', userData.email);
          }
          
          alert('구글 로그인 회원가입이 완료되었습니다!\n\n추가 정보를 입력해주세요.');
          window.location.href = 'complete-profile.html';
          return;
        }
        
        // 프로필이 이미 완성된 경우에만 upsertUser 호출
        const upsertResult = await upsertUser(userData, {
          lastLogin: new Date(),
          providerId: additionalInfo.providerId || providerData.providerId || 'google',
          isNewUser: additionalInfo.isNewUser ?? options.isNewUser ?? isNewUserBeforeUpsert
        });
        
        // 새 사용자인지 확인 (additionalInfo.isNewUser 또는 upsertResult.isNewUser 사용)
        const isNewUser = additionalInfo.isNewUser ?? upsertResult?.isNewUser ?? isNewUserBeforeUpsert;
        
        localStorage.setItem('loggedIn', 'true');
        localStorage.setItem('currentUser', JSON.stringify(userData));
        localStorage.setItem('user', JSON.stringify(userData));
        if (userData.email) {
          localStorage.setItem('loggedInEmail', userData.email);
        }
        
        // 성공 메시지 및 리디렉션
        if (isNewUser) {
          alert('구글 로그인 회원가입이 완료되었습니다!\n\n실제 고객 후기를 확인해보세요!');
        } else {
          alert('이미 가입된 계정입니다. 로그인되었습니다.');
        }
        
        window.location.href = 'more-reviews.html';
      }

      // 구글 회원가입/로그인 함수 - 즉시 팝업 구조 (모든 검증은 미리 완료)
      async function registerWithGoogle() {
        // 버튼 비활성화 (중복 클릭 방지)
        const button = document.getElementById('google-register');
        const originalText = document.getElementById('google-register-text')?.textContent;
        if (button) {
          button.disabled = true;
          const text = document.getElementById('google-register-text');
          if (text) text.textContent = '로그인 중...';
        }
        
        try {
          // Firebase 준비 상태 확인 (이미 준비되어 있어야 함)
          if (!window.isFirebaseReady) {
            await waitForFirebase();
          }
          
          // 최종 검증 (즉시 실행을 위한 최소한의 체크만)
          if (!window.firebaseAuth || !window.firebaseGoogleProvider || !window.firebaseAuthFunctions) {
            throw new Error('구글 로그인 구성이 완료되지 않았습니다.');
          }
          
          const { signInWithPopup, getAdditionalUserInfo } = window.firebaseAuthFunctions;
          
          // 즉시 팝업 실행 (모든 검증은 이미 완료됨)
          let result = null;
          try {
            result = await signInWithPopup(window.firebaseAuth, window.firebaseGoogleProvider);
          } catch (popupError) {
            // 사용자 친화적인 에러 메시지로 변환
            let userMessage = '구글 로그인 중 오류가 발생했습니다.';
            
            if (popupError.code === 'auth/popup-blocked') {
              userMessage = '브라우저에서 팝업이 차단되었습니다.\n\n브라우저 설정에서 팝업을 허용하거나, 아래 버튼을 다시 눌러주세요.';
            } else if (popupError.code === 'auth/cancelled-popup-request') {
              userMessage = '이전 로그인 요청이 완료되지 않았습니다.\n\n잠시 후 다시 시도해주세요.';
            } else if (popupError.code === 'auth/popup-closed-by-user') {
              userMessage = '로그인 창이 닫혔습니다.\n\n다시 시도해주세요.';
            } else if (popupError.code === 'auth/operation-not-supported-in-this-environment') {
              userMessage = '현재 환경에서는 팝업 로그인을 지원하지 않습니다.\n\n다른 브라우저를 사용해주세요.';
            } else if (popupError.message) {
              userMessage = `로그인 중 오류가 발생했습니다: ${popupError.message}`;
            }
            
            // 버튼 재활성화
            if (button) {
              button.disabled = false;
              const text = document.getElementById('google-register-text');
              if (text) text.textContent = originalText || 'Google 계정으로 가입하기';
            }
            
            alert(userMessage);
            console.error('❌ Google 로그인 실패:', popupError);
            return;
          }
          
          if (result?.user) {
            const additionalInfo = getAdditionalUserInfo ? getAdditionalUserInfo(result) : null;
            await finalizeSocialLogin(result.user, {
              loginMethod: 'google',
              additionalInfo,
              toastMessage: 'Google 계정으로 로그인되었습니다.'
            });
          }
        } catch (error) {
          console.error('❌ Google 로그인 실패:', error);
          
          // 버튼 재활성화
          if (button) {
            button.disabled = false;
            const text = document.getElementById('google-register-text');
            if (text) text.textContent = originalText || 'Google 계정으로 가입하기';
          }
          
          // 사용자 친화적인 메시지
          let userMessage = '구글 로그인 중 오류가 발생했습니다.';
          if (error.message) {
            userMessage = `로그인 중 오류가 발생했습니다.\n\n${error.message}\n\n페이지를 새로고침한 후 다시 시도해주세요.`;
          }
          alert(userMessage);
        }
      }
      
      // 전역으로 즉시 노출 (index.html 방식)
      window.registerWithGoogle = registerWithGoogle;
      console.log('✅ registerWithGoogle 함수를 window 객체에 등록 완료');

      // EmailJS 초기화
      function initEmailJS() {
        // EmailJS 공개 키 (실제 사용 시 https://dashboard.emailjs.com/admin/integration 에서 발급받아야 함)
        emailjs.init("zrRVWnL0cA9eyxpDp"); // 실제 Public Key (복사 완료)
        
        console.log('📧 EmailJS 초기화 완료');
      }

      // 기존 사용자 데이터 정리 함수
      function cleanupUserData() {
        try {
          console.log('🧹 기존 사용자 데이터 정리 시작...');
          
          // 기존 users 배열 확인
          const existingUsers = JSON.parse(localStorage.getItem('users') || '[]');
          console.log('📋 기존 사용자 수:', existingUsers.length);
          
          // 잘못된 형식의 데이터 정리
          const cleanedUsers = existingUsers.filter(user => {
            // email 필드가 없고 emailVerification만 있는 경우 수정
            if (!user.email && user.emailVerification) {
              user.email = user.emailVerification;
              console.log('✅ 이메일 필드 수정:', user.email);
            }
            
            // 필수 필드가 있는지 확인
            return user.email && user.password && user.name && user.phone;
          });
          
          // localStorage 사용자 데이터 정리 제거 - Firebase 전용
          console.log('✅ Firebase 전용 시스템 - localStorage 사용자 데이터 정리 불필요');
          
          return cleanedUsers;
        } catch (error) {
          console.error('❌ 사용자 데이터 정리 실패:', error);
          return [];
        }
      }


      // 실제 이메일 인증번호 발송
      async function sendEmailVerification() {
        console.log('📧 이메일 인증번호 발송 함수 호출됨');
        const email = document.getElementById('email-verification').value;
        
        if (!email) {
          alert('이메일을 입력해주세요.');
          return;
        }
        
        // 이메일 형식 검증
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          alert('올바른 이메일 형식을 입력해주세요.');
          return;
        }
        
        // 인증번호 생성
        const verificationCode = Math.floor(100000 + Math.random() * 900000).toString();
        localStorage.setItem('emailVerificationCode', verificationCode);
        localStorage.setItem('emailVerificationTime', Date.now().toString());
        
        // UI 업데이트
        document.getElementById('email-verification-code').classList.remove('hidden');
        document.getElementById('send-email').textContent = '발송 중...';
        document.getElementById('send-email').disabled = true;
        
        try {
          // EmailJS를 사용한 실제 이메일 발송
          const templateParams = {
            to_email: email,
            verification_code: verificationCode,
            user_name: document.getElementById('name').value || '사용자',
            from_name: 'PriceHunter'
          };
          
          // EmailJS 서비스 ID와 템플릿 ID (실제 사용 시 교체 필요)
          const result = await emailjs.send(
            'service_qq3o0or', // 실제 서비스 ID (이미 확인됨)
            'template_9oj52gx', // 실제 템플릿 ID (복사 완료)
            templateParams
          );
          
          console.log('✅ 이메일 발송 성공:', result);
          
          // UI 업데이트
          document.getElementById('send-email').textContent = '재발송';
          document.getElementById('send-email').disabled = false;
          
          // 타이머 시작 (5분)
          startEmailTimer();
          
          alert('인증번호가 이메일로 발송되었습니다. 이메일을 확인해주세요.');
          
        } catch (error) {
          console.error('❌ 이메일 발송 실패:', error);
          
          // 실패 시 Mock 시스템으로 폴백
          console.log('🔄 Mock 시스템으로 폴백');
          document.getElementById('send-email').textContent = '재발송';
          document.getElementById('send-email').disabled = false;
          startEmailTimer();
          
          alert(`인증번호가 발송되었습니다.\n인증번호: ${verificationCode}\n(개발 모드: 실제 이메일 발송 실패)`);
        }
      }
      
      // 전역으로 노출 (이벤트 리스너에서 접근 가능하도록)
      window.sendEmailVerification = sendEmailVerification;
      window.verifyEmailCode = verifyEmailCode;
      console.log('✅ 이메일 인증 함수들을 window 객체에 등록 완료');

      // 이메일 타이머 시작
      function startEmailTimer() {
        let timeLeft = 300; // 5분
        const timer = setInterval(() => {
          const minutes = Math.floor(timeLeft / 60);
          const seconds = timeLeft % 60;
          document.getElementById('email-timer').textContent = `남은 시간: ${minutes}:${seconds.toString().padStart(2, '0')}`;
          
          if (timeLeft <= 0) {
            clearInterval(timer);
            document.getElementById('email-timer').textContent = '인증 시간이 만료되었습니다.';

        const storedTime = localStorage.getItem('emailVerificationTime');
        
        if (!inputCode) {

          return;
        }
        
        // 시간 만료 확인 (5분)
        const currentTime = Date.now();
        const timeDiff = currentTime - parseInt(storedTime);
        if (timeDiff > 300000) { // 5분 = 300000ms
          alert('인증 시간이 만료되었습니다. 다시 발송해주세요.');

      function checkPasswordStrength(password) {
        const strengthElement = document.getElementById('password-strength');

        if (password.length >= 8) strength++;
        if (/[a-z]/.test(password)) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;
        
        switch (strength) {
          case 0:
          case 1:
            message = '❌ 매우 약함';
            strengthElement.className = 'mt-2 text-sm text-red-600';
            break;
          case 2:
            message = '⚠️ 약함';
            strengthElement.className = 'mt-2 text-sm text-orange-600';
            break;
          case 3:
            message = '✅ 보통';
            strengthElement.className = 'mt-2 text-sm text-yellow-600';
            break;
          case 4:
            message = '✅ 강함';
            strengthElement.className = 'mt-2 text-sm text-green-600';
            break;
          case 5:
            message = '✅ 매우 강함';
            strengthElement.className = 'mt-2 text-sm text-green-600';
            break;
        }
        
        strengthElement.textContent = message;
      }

      // 비밀번호 일치 확인
      function checkPasswordMatch() {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const matchElement = document.getElementById('password-match');
        
        if (confirmPassword === '') {
          matchElement.textContent = '';
          return;
        }
        
        if (password === confirmPassword) {
          matchElement.textContent = '✅ 비밀번호가 일치합니다.';
          matchElement.className = 'mt-2 text-sm text-green-600';
          } else {
          matchElement.textContent = '❌ 비밀번호가 일치하지 않습니다.';
          matchElement.className = 'mt-2 text-sm text-red-600';
        }
      }

  </script>
