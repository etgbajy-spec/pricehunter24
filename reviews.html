<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>고객 후기 - 프라이스헌터</title>
    <meta name="description" content="프라이스헌터 실제 고객 후기. 데이터로 확인하고 똑똑하게 소비한 고객들의 경험을 확인하세요." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { font-family: "Noto Sans KR", system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      .tabular-nums { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-white">
    <header class="sticky top-0 z-40 backdrop-blur bg-slate-950/40 border-b border-white/10">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
        <a href="index.html" class="flex items-center gap-2 font-extrabold tracking-tight">
          <span class="text-lg sm:text-xl">프라이스헌터</span>
          <span class="text-white/50 text-sm hidden sm:inline">고객 후기</span>
        </a>
        <div class="flex items-center gap-2">
          <a href="support.html" class="px-4 py-2 rounded-xl bg-white/10 border border-white/10 hover:bg-white/15 transition font-semibold">
            서비스
          </a>
          <a href="request-v2.html" class="px-4 py-2 rounded-xl bg-gradient-to-r from-orange-500 to-orange-600 font-bold shadow hover:from-orange-600 hover:to-orange-700 transition">
            의뢰하기
          </a>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
      <div class="text-center mb-8">
        <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold tracking-tight">
          AI로 더 똑똑해진 소비자들의 실제 후기
        </h1>
        <p class="mt-3 text-white/70 text-sm sm:text-base">
          감으로 사지 않고, 데이터로 확인한 사람들이 남긴 경험담을 모아봤어요.
        </p>
      </div>

      <div class="mb-6 flex flex-col lg:flex-row gap-3 items-stretch lg:items-center justify-between">
        <div class="flex-1">
          <label class="sr-only" for="search">후기 검색</label>
          <input id="search" type="text" placeholder="제품명 또는 후기 내용 검색"
            class="w-full rounded-2xl bg-white/10 border border-white/10 px-4 py-3 text-white placeholder:text-white/40 outline-none focus:ring-4 focus:ring-blue-300/30" />
        </div>
        <div class="flex flex-col sm:flex-row gap-2">
          <div>
            <label class="sr-only" for="sort">정렬</label>
            <select id="sort" class="w-full sm:w-auto px-4 py-3 rounded-2xl bg-white/10 border border-white/10 hover:bg-white/15 transition font-semibold outline-none focus:ring-4 focus:ring-blue-300/30">
              <option value="newest">최신순</option>
              <option value="savings">할인액(절약) 큰 순</option>
              <option value="rate">할인률 높은 순</option>
              <option value="finalPrice">검증 최저가 낮은 순</option>
            </select>
          </div>
          <button id="refresh" class="px-4 py-3 rounded-2xl bg-white/10 border border-white/10 hover:bg-white/15 transition font-semibold">
            새로고침
          </button>
          <a href="contact.html" class="px-4 py-3 rounded-2xl bg-white/10 border border-white/10 hover:bg-white/15 transition font-semibold text-center">
            문의하기
          </a>
        </div>
      </div>

      <div id="status" class="text-center text-white/60 py-10">후기를 불러오는 중...</div>
      <div id="summary" class="hidden mb-6 rounded-3xl bg-white/6 border border-white/10 p-4 sm:p-5">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
          <div class="font-extrabold text-lg">한눈에 보는 후기 요약</div>
          <div id="summary-badges" class="flex flex-wrap gap-2 text-sm"></div>
        </div>
      </div>
      <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 hidden"></div>
    </main>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
      import { getFirestore, collection, query, where, orderBy, getDocs } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

      const firebaseConfig = {
        apiKey: "AIzaSyDBZxKyMS7eeBTbPnbZkj0WWOZQHNldoL4",
        authDomain: "pricehunter-99a1b.firebaseapp.com",
        projectId: "pricehunter-99a1b",
        storageBucket: "pricehunter-99a1b.firebasestorage.app",
        messagingSenderId: "242265693919",
        appId: "1:242265693919:web:74234d942b82a51541136a",
        measurementId: "G-4BKLV4EVB9"
      };

      const statusEl = document.getElementById('status');
      const gridEl = document.getElementById('grid');
      const searchEl = document.getElementById('search');
      const refreshEl = document.getElementById('refresh');
      const sortEl = document.getElementById('sort');
      const summaryEl = document.getElementById('summary');
      const summaryBadgesEl = document.getElementById('summary-badges');

      let all = [];

      function pickImage(d) {
        if (Array.isArray(d.images) && d.images[0]) return d.images[0];
        if (Array.isArray(d.photos) && d.photos[0]) return d.photos[0];
        return d.image || d.productImage || d.itemImage || d.photo || '';
      }

      function safeText(v, fallback = '') {
        return (typeof v === 'string' && v.trim()) ? v.trim() : fallback;
      }

      function escapeHtml(s) {
        return (s || '').replaceAll('&', '&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
      }

      function parsePriceLike(v) {
        if (typeof v === 'number' && Number.isFinite(v)) return v;
        if (typeof v !== 'string') return 0;
        const n = parseInt(v.replace(/[^0-9]/g, ''), 10);
        return Number.isFinite(n) ? n : 0;
      }

      function formatWon(n) {
        const num = typeof n === 'number' ? n : parsePriceLike(n);
        if (!num) return '-';
        return num.toLocaleString('ko-KR') + '원';
      }

      function normalizeReview(r) {
        const originalPrice = parsePriceLike(r.originalPrice ?? r.originPrice ?? r.priceOriginal ?? r.beforePrice);
        const finalPrice = parsePriceLike(r.finalPrice ?? r.afterPrice ?? r.discountPrice ?? r.priceFinal);
        const savings = parsePriceLike(r.savings ?? r.saveAmount ?? r.discountAmount);

        // rate 후보들 (정수 %)
        let rate = 0;
        const rateCandidate = r.rate ?? r.savingsPercent ?? r.ratePercent ?? r.discountRate;
        if (typeof rateCandidate === 'number') rate = Math.round(rateCandidate);
        if (typeof rateCandidate === 'string') rate = parseInt(rateCandidate.replace(/[^0-9]/g, ''), 10) || 0;

        let computedOriginal = originalPrice;
        let computedFinal = finalPrice;
        let computedSavings = savings;
        let computedRate = rate;

        if (!computedSavings && computedOriginal && computedFinal && computedOriginal > computedFinal) {
          computedSavings = computedOriginal - computedFinal;
        }
        if (!computedFinal && computedOriginal && computedSavings && computedOriginal > computedSavings) {
          computedFinal = computedOriginal - computedSavings;
        }
        if (!computedOriginal && computedFinal && computedSavings) {
          computedOriginal = computedFinal + computedSavings;
        }
        if (!computedRate && computedOriginal && computedFinal && computedOriginal > 0 && computedOriginal > computedFinal) {
          computedRate = Math.round(((computedOriginal - computedFinal) / computedOriginal) * 100);
        }

        // createdAt 정규화 (정렬용)
        let createdAtMs = 0;
        const c = r.createdAt ?? r.timestamp ?? r.created_at;
        try {
          if (c && typeof c.toMillis === 'function') createdAtMs = c.toMillis();
          else if (c instanceof Date) createdAtMs = c.getTime();
          else if (typeof c === 'number') createdAtMs = c;
          else if (typeof c === 'string') createdAtMs = Date.parse(c) || 0;
        } catch (e) {
          createdAtMs = 0;
        }

        return {
          ...r,
          __computed: {
            originalPrice: computedOriginal,
            finalPrice: computedFinal,
            savings: computedSavings,
            rate: computedRate,
            createdAtMs
          }
        };
      }

      function updateSummary(list) {
        if (!summaryEl || !summaryBadgesEl) return;
        if (!list || list.length === 0) {
          summaryEl.classList.add('hidden');
          return;
        }

        const rates = list.map(r => r.__computed?.rate || 0).filter(Boolean);
        const savings = list.map(r => r.__computed?.savings || 0).filter(Boolean);

        const avgRate = rates.length ? Math.round(rates.reduce((a,b)=>a+b,0) / rates.length) : 0;
        const maxRate = rates.length ? Math.max(...rates) : 0;
        const maxSavings = savings.length ? Math.max(...savings) : 0;

        summaryBadgesEl.innerHTML = `
          <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-white/10 border border-white/10">
            전체 <b class="text-white">${list.length}</b>개
          </span>
          <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-blue-500/15 border border-blue-400/20">
            평균 할인률 <b class="text-blue-200">${avgRate || '-'}%</b>
          </span>
          <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-emerald-500/15 border border-emerald-400/20">
            최고 할인률 <b class="text-emerald-200">${maxRate || '-'}%</b>
          </span>
          <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-orange-500/15 border border-orange-400/20">
            최대 절약 <b class="text-orange-200 whitespace-nowrap tabular-nums">${maxSavings ? formatWon(maxSavings) : '-'}</b>
          </span>
        `;
        summaryEl.classList.remove('hidden');
      }

      function render(list) {
        if (!list || list.length === 0) {
          gridEl.classList.add('hidden');
          statusEl.classList.remove('hidden');
          statusEl.textContent = '아직 표시할 후기가 없습니다.';
          updateSummary([]);
          return;
        }

        statusEl.classList.add('hidden');
        gridEl.classList.remove('hidden');
        updateSummary(list);

        gridEl.innerHTML = list.map((r) => {
          const product = safeText(r.product || r.productName || r.itemName, '제품');
          const name = safeText(r.name, '고객');
          const review = safeText(r.review, '후기 내용이 없습니다.');
          const img = pickImage(r);
          const c = r.__computed || {};
          const rate = c.rate || 0;
          const savings = c.savings || 0;
          const original = c.originalPrice || 0;
          const finalP = c.finalPrice || 0;

          return `
            <article class="rounded-3xl bg-white/8 border border-white/10 overflow-hidden shadow-lg hover:bg-white/10 transition">
              <div class="p-5">
                <div class="flex items-center gap-4">
                  <div class="w-16 h-16 rounded-2xl bg-white/10 border border-white/10 overflow-hidden flex items-center justify-center flex-shrink-0">
                    ${img ? `<img src="${escapeHtml(img)}" alt="${escapeHtml(product)}" class="w-full h-full object-cover" onerror="this.remove()">` : `<span class="text-white/30 text-xs">no image</span>`}
                  </div>
                  <div class="min-w-0">
                    <div class="font-extrabold text-lg truncate">${escapeHtml(product)}</div>
                    <div class="text-white/60 text-sm">${escapeHtml(name)}님</div>
                  </div>
                </div>

                <div class="mt-4 rounded-2xl bg-gradient-to-br from-white/10 to-white/5 border border-white/10 p-4">
                  <div class="flex items-center justify-between gap-3">
                    <div class="text-sm text-white/60 font-semibold">할인률</div>
                    <div class="text-xl font-extrabold ${rate >= 30 ? 'text-emerald-200' : rate >= 15 ? 'text-blue-200' : 'text-white'}">
                      ${rate ? `${rate}%` : '-'}
                    </div>
                  </div>
                  <div class="mt-3 grid grid-cols-3 gap-2">
                    <div class="rounded-xl bg-black/20 border border-white/10 p-3">
                      <div class="text-[11px] text-white/55 font-semibold mb-1">원가</div>
                    <div class="text-sm font-bold whitespace-nowrap tabular-nums">${original ? formatWon(original) : '-'}</div>
                    </div>
                    <div class="rounded-xl bg-black/20 border border-white/10 p-3">
                      <div class="text-[11px] text-white/55 font-semibold mb-1">검증 최저가</div>
                      <div class="text-sm font-bold whitespace-nowrap tabular-nums">${finalP ? formatWon(finalP) : '-'}</div>
                    </div>
                    <div class="rounded-xl bg-black/20 border border-white/10 p-3">
                      <div class="text-[11px] text-white/55 font-semibold mb-1">할인액</div>
                      <div class="text-sm font-bold whitespace-nowrap tabular-nums ${savings ? 'text-orange-200' : ''}">${savings ? formatWon(savings) : '-'}</div>
                    </div>
                  </div>
                </div>

                <p class="mt-4 text-white/85 text-sm leading-relaxed whitespace-pre-line">
                  ${escapeHtml(review)}
                </p>
              </div>
            </article>
          `;
        }).join('');
      }

      function getSorted(list) {
        const mode = sortEl?.value || 'newest';
        const arr = [...list];
        arr.sort((a, b) => {
          const ac = a.__computed || {};
          const bc = b.__computed || {};
          if (mode === 'savings') return (bc.savings || 0) - (ac.savings || 0);
          if (mode === 'rate') return (bc.rate || 0) - (ac.rate || 0);
          if (mode === 'finalPrice') {
            const af = ac.finalPrice || Number.MAX_SAFE_INTEGER;
            const bf = bc.finalPrice || Number.MAX_SAFE_INTEGER;
            return af - bf;
          }
          // newest
          return (bc.createdAtMs || 0) - (ac.createdAtMs || 0);
        });
        return arr;
      }

      function applySearch() {
        const q = (searchEl.value || '').trim().toLowerCase();
        const base = getSorted(all);
        if (!q) return render(base);
        const filtered = base.filter((r) => {
          const product = (r.product || r.productName || r.itemName || '').toString().toLowerCase();
          const review = (r.review || '').toString().toLowerCase();
          return product.includes(q) || review.includes(q);
        });
        render(filtered);
      }

      async function load() {
        try {
          statusEl.classList.remove('hidden');
          statusEl.textContent = '후기를 불러오는 중...';
          gridEl.classList.add('hidden');

          const app = initializeApp(firebaseConfig);
          const db = getFirestore(app);

          const reviewsRef = collection(db, 'reviews');
          let qs;
          try {
            qs = await getDocs(query(reviewsRef, where('approved', '==', true), orderBy('createdAt', 'desc')));
          } catch (e) {
            qs = await getDocs(query(reviewsRef, where('approved', '==', true)));
          }

          all = [];
          qs.forEach((doc) => all.push(normalizeReview({ id: doc.id, ...doc.data() })));
          applySearch();
        } catch (e) {
          console.error(e);
          gridEl.classList.add('hidden');
          statusEl.classList.remove('hidden');
          statusEl.textContent = '후기를 불러오지 못했어요. 잠시 후 다시 시도해주세요.';
          updateSummary([]);
        }
      }

      searchEl.addEventListener('input', applySearch);
      refreshEl.addEventListener('click', load);
      if (sortEl) sortEl.addEventListener('change', applySearch);

      load();
    </script>
  </body>
</html>
