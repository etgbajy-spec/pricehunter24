<!--
  EmailJS 공용 템플릿 (고객 답변 완료 + 운영자 신규 의뢰)
  Template ID: template_fk0poj6

  [설정]
  Subject (고정): [PriceHunter] 의뢰 답변이 완료되었습니다
  To Email: {{to_email}}
  From Name: PriceHunter  (고정! 변수 쓰지 마세요)
  Reply To: pricehunter.service@gmail.com

  ※ 고객 답변 메일: 결과 리포트는 이메일에 넣지 않음 — 사이트에서만 확인
  ※ 운영자 신규 의뢰 알림: show_site_notice 가 없으면 안내 박스 숨김
-->
<div style="font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; font-size: 14px; line-height: 1.6; color: #333; max-width: 560px; margin: 0 auto;">
  <div style="background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%); padding: 24px 28px; border-radius: 12px 12px 0 0; text-align: center;">
    <div style="font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px;">🔍 PriceHunter</div>
    <div style="font-size: 13px; color: rgba(255,255,255,0.9); margin-top: 4px;">{{email_subject}}</div>
  </div>

  <div style="background: #fff; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 12px 12px; padding: 28px 28px 32px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.06);">
    <p style="margin: 0 0 20px; font-size: 16px; color: #1f2937;">{{headline}}</p>

    <div style="background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); border-radius: 10px; padding: 18px 20px; margin: 20px 0; border-left: 4px solid #8b5cf6;">
      <table role="presentation" style="width: 100%; border-collapse: collapse;">
        <tr>
          <td style="vertical-align: top; width: 42px;">
            <div style="width: 36px; height: 36px; background: #8b5cf6; border-radius: 8px; text-align: center; line-height: 36px; font-size: 18px;">📋</div>
          </td>
          <td style="vertical-align: top;">
            <div style="font-size: 13px; color: #6b7280; margin-bottom: 4px;">의뢰 번호</div>
            <div style="font-size: 17px; font-weight: 700; color: #4c1d95;">{{request_number}}</div>
            <div style="font-size: 13px; color: #6b7280; margin-top: 12px; margin-bottom: 2px;">상세 정보</div>
            <div style="font-size: 15px; font-weight: 600; color: #374151; white-space: pre-line;">{{product_name}}</div>
          </td>
        </tr>
      </table>
    </div>

    {{#show_site_notice}}
    <div style="background: linear-gradient(135deg, #eff6ff 0%, #e0e7ff 100%); border-radius: 10px; padding: 18px 20px; margin: 0 0 20px; border-left: 4px solid #6366f1;">
      <div style="font-size: 13px; font-weight: 700; color: #4338ca; margin-bottom: 8px;">🌐 사이트에서 결과 확인</div>
      <div style="font-size: 14px; color: #374151; line-height: 1.7;">{{site_teaser}}</div>
      <div style="font-size: 13px; color: #6b7280; margin-top: 10px;">보안을 위해 리포트 전문은 이메일이 아닌 PriceHunter 홈페이지에서만 제공됩니다.</div>
    </div>
    {{/show_site_notice}}

    <p style="margin: 0 0 24px; font-size: 14px; color: #4b5563;">{{footer_message}}</p>

    <div style="text-align: center; margin: 28px 0 0;">
      <a href="{{check_url}}" target="_blank" rel="noopener" style="display: inline-block; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: #fff !important; font-size: 15px; font-weight: 700; text-decoration: none; padding: 14px 32px; border-radius: 10px; box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);">
        {{cta_label}}
      </a>
    </div>
  </div>

  <div style="text-align: center; padding: 16px 0; font-size: 12px; color: #9ca3af;">
    PriceHunter · 최저가 검색 의뢰 서비스
  </div>
</div>
