    // 스마트 이미지 압축 함수 (자동으로 크기에 맞게 압축)
    function compressImage(file, targetSizeKB = 500) {
      return new Promise((resolve, reject) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        img.onload = function() {
          let { width, height } = img;
          let quality = 0.8;
          let maxWidth = 1200;
          
          // 초기 압축
          if (width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }
          
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          
          // 크기 체크 및 재압축
          const checkSize = (q) => {
            const dataUrl = canvas.toDataURL('image/jpeg', q);
            const sizeKB = (dataUrl.length * 0.75) / 1024; // base64 to KB
            
            if (sizeKB > targetSizeKB && q > 0.1) {
              return checkSize(q - 0.1);
            }
            return dataUrl;
          };
          
          const compressedDataUrl = checkSize(quality);
          resolve(compressedDataUrl);
        };
        
        img.onerror = () => reject(new Error('이미지 로드 실패'));
        img.src = URL.createObjectURL(file);
      });
    }

    // Base64 이미지 직접 압축 함수 (CSP 문제 해결)
    function compressBase64Image(base64DataUrl, targetSizeKB = 500) {
      return new Promise((resolve, reject) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        img.onload = function() {
          let { width, height } = img;
          let quality = 0.8;
          let maxWidth = 1200;
          
          // 초기 압축
          if (width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }
          
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          
          // 크기 체크 및 재압축
          const checkSize = (q) => {
            const dataUrl = canvas.toDataURL('image/jpeg', q);
            const sizeKB = (dataUrl.length * 0.75) / 1024; // base64 to KB
            
            if (sizeKB > targetSizeKB && q > 0.1) {
              return checkSize(q - 0.1);
            }
            return dataUrl;
          };
          
          const compressedDataUrl = checkSize(quality);
          resolve(compressedDataUrl);
        };
        
        img.onerror = () => reject(new Error('이미지 로드 실패'));
        img.src = base64DataUrl; // Base64 데이터를 직접 사용
      });
    }

    // Firebase에 문의 데이터 저장
    async function saveInquiryToFirebase(inquiryData) {
      try {
        await waitForFirebase();
        
        const { collection, addDoc, serverTimestamp } = window.firebaseFirestoreFunctions;
        const inquiriesRef = collection(window.firebaseDb, 'inquiries');
        
        const docRef = await addDoc(inquiriesRef, {
          ...inquiryData,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          status: 'new',
          source: 'contact_form'
        });
        
        console.log('✅ Firebase에 문의 저장 완료:', docRef.id);
        return docRef.id;
      } catch (error) {
        console.error('❌ Firebase 문의 저장 실패:', error);
        
        // Firebase 저장 실패 시 오류 메시지와 함께 throw
        if (error.message.includes('Missing or insufficient permissions') || 
            error.message.includes('permission-denied')) {
          throw new Error('Firebase 권한 오류가 발생했습니다. 관리자에게 문의하세요.');
        }
        
        throw error;
      }
    }

        return;

      // 문의 데이터 준비

        subject, 
        message, 
        name, 
        email, 
        file, 
        date: new Date().toLocaleString(),
        timestamp: Date.now()
      };
      
      try {
        // 파일이 있고 이미지인 경우 압축 적용
        if (file && file.startsWith('data:image/')) {
          console.log('📷 이미지 파일 감지 - 압축 시작...');
          
          // 압축 진행 상황 표시

            const compressedDataUrl = await compressBase64Image(file, 500);
            inquiry.file = compressedDataUrl;
            console.log('✅ 이미지 압축 완료');
          } catch (compressError) {
            console.warn('⚠️ 첫 번째 압축 실패, 더 강한 압축 시도...');
            try {
              // 200KB 이하로 강한 압축 시도
              const compressedDataUrl = await compressBase64Image(file, 200);
              inquiry.file = compressedDataUrl;
              console.log('✅ 강한 압축 완료');
            } catch (strongCompressError) {
              console.error('❌ 압축 실패, 원본 사용 (Firebase 저장 실패 가능성 있음)');
              // 압축 실패 시 원본 사용 (Firebase 저장 실패 가능성 있음)
            }

            submitBtn.textContent = '문의 제출 중...';
          }
        }
        
        // Firebase에 저장 시도
        console.log('🔥 Firebase에 문의 저장 시작...');
        const firebaseResult = await saveInquiryToFirebase(inquiry);
        
        // localStorage 백업 저장 제거 - Firebase 전용
        console.log('✅ Firebase에만 문의 데이터 저장');
        
        // 성공 메시지 표시
        alert('문의가 접수되었습니다!\n데이터가 Firebase 서버에 안전하게 저장되었습니다.');
        
        document.getElementById('contact-success').classList.remove('hidden');
        this.reset();
        filePreview.innerHTML = '';
        fileData = '';
        renderHistory();
        
      } catch (error) {
        console.error('문의 제출 실패:', error);
        alert('문의 제출 중 오류가 발생했습니다: ' + error.message);

        }

    // 문의/답변 내용 안전하게 렌더링
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    // 댓글 렌더링 함수
    function renderComments(comments) {
      if (!comments || !comments.length) return '';
      
      let html = '<ul class="mb-2 space-y-2">';
      comments.forEach((c, index) => {
        const isAdmin = c.author === '관리자';
        const isUserComment = !isAdmin;
        
        // 답변 정보 표시
        let replyInfoHtml = '';
        if (c.replyInfo && isAdmin) {
          replyInfoHtml = `
            <div class="mt-1 p-2 bg-blue-50 border-l-4 border-blue-400 rounded text-xs">
              <div class="text-blue-700 font-semibold">↳ 내 댓글에 답변</div>
              <div class="text-blue-600 mt-1">"${escapeHtml(c.replyInfo.replyToText.substring(0, 50))}${c.replyInfo.replyToText.length > 50 ? '...' : ''}"</div>
            </div>
          `;
        }
        
        html += `
          <li class='text-sm p-3 rounded ${isAdmin ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-700'}'>
            <div class="font-semibold text-xs ${isAdmin ? 'text-blue-600' : 'text-gray-600'}">${escapeHtml(c.author||'익명')}</div>
            ${replyInfoHtml}
            <div class="mt-1">${escapeHtml(c.text)}</div>
            <div class="text-xs text-gray-400 mt-1">${formatDateTime(c.date)}</div>
          </li>
        `;
      });
      html += '</ul>';
      return html;
    }
    
    // 실시간 댓글 업데이트를 위한 함수
    function updateCommentsInRealTime() {
      const commentForms = document.querySelectorAll('.comment-form');
      commentForms.forEach(form => {
        const subject = form.getAttribute('data-subject');
        const date = form.getAttribute('data-date');
        
        // inquiry-에서 최신 댓글 정보 가져오기
        let inquiryKey = null;
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key.startsWith('inquiry-')) {
            const obj = JSON.parse(localStorage.getItem(key));
            if (obj && obj.subject === subject && obj.date === date) {
              inquiryKey = key;
              break;
            }
          }
        }
        
        if (inquiryKey) {
          const inquiry = JSON.parse(localStorage.getItem(inquiryKey));
          const commentsHtml = renderComments(inquiry.comments || []);
          const commentsContainer = form.previousElementSibling;
          if (commentsContainer && commentsContainer.classList.contains('comments-list')) {
            commentsContainer.innerHTML = commentsHtml;
          }
        }
      });
    }
    
    // 문의 삭제 함수

      renderHistory();
    }
    // Firebase 초기화 대기 함수
    async function waitForFirebase() {
      return new Promise((resolve, reject) => {
        if (window.firebaseApp && window.firebaseDb && window.firebaseFirestoreFunctions) {
          resolve();
        } else {
          const checkInterval = setInterval(() => {
            if (window.firebaseApp && window.firebaseDb && window.firebaseFirestoreFunctions) {
              clearInterval(checkInterval);
              resolve();
            }
          }, 100);
          
          setTimeout(() => {
            clearInterval(checkInterval);
            reject(new Error('Firebase 초기화 실패'));
          }, 10000);
        }
      });
    }

    // 공통 함수: 사용자 이메일 가져오기
    function getUserEmail() {
      let userEmail = localStorage.getItem('loggedInEmail');
      
      if (!userEmail) {
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (currentUser.email) {
          userEmail = currentUser.email;
        } else if (user.email) {
          userEmail = user.email;
        }
      }
      
      return userEmail;
    }

    // Firebase에서 문의 데이터 가져오기
    async function getInquiriesFromFirebase() {
      try {
        await waitForFirebase();
        const { collection, query, where, getDocs, limit } = window.firebaseFirestoreFunctions;
        const db = window.firebaseDb;
        
        // 현재 사용자 이메일 가져오기
        const userEmail = getUserEmail();
        
        if (!userEmail) {
          console.log('❌ 사용자 이메일을 찾을 수 없어서 Firebase에서 문의 데이터를 가져올 수 없습니다.');
          return [];
        }
        
        // Firebase에서 해당 사용자의 문의 데이터 조회
        console.log('🔍 사용자 이메일로 문의 데이터 조회:', userEmail);
        
        let querySnapshot;
        try {
          const inquiriesQuery = query(
            collection(db, 'inquiries'),
            where('email', '==', userEmail)
          );
          
          querySnapshot = await getDocs(inquiriesQuery);
          console.log('🔍 문의 쿼리 결과:', querySnapshot.size, '개 문서 발견');
        } catch (queryError) {
          console.warn('⚠️ 문의 where 쿼리 실패, 모든 데이터를 가져와서 필터링:', queryError);
          
          // 쿼리 실패시 최신 500개만 가져와서 클라이언트에서 필터링
          const allInquiriesQuery = query(collection(db, 'inquiries'), limit(500));
          querySnapshot = await getDocs(allInquiriesQuery);
          console.log('🔍 전체 문의 데이터 (최신 500개):', querySnapshot.size, '개 문서 발견');
        }
        const inquiries = [];
        
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          
          // 이메일이 일치하는 경우만 추가
          if (data.email === userEmail) {
            inquiries.push({
              id: doc.id,
              ...data
            });
          }
        });
        
        // 클라이언트 사이드에서 정렬 (date 또는 createdAt 기준 내림차순)
        inquiries.sort((a, b) => {
          const aTime = a.date ? new Date(a.date) : (a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt || 0));
          const bTime = b.date ? new Date(b.date) : (b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt || 0));
          return bTime - aTime;
        });
        
        console.log(`✅ Firebase에서 문의 데이터 ${inquiries.length}개 가져옴`);
        return inquiries;
      } catch (error) {
        console.error('❌ Firebase에서 문의 데이터 가져오기 실패:', error);
        return [];
      }
    }

    // 날짜를 안전하게 포맷팅하는 함수
    function formatDateForDisplay(dateValue) {
      if (!dateValue) return 'N/A';
      
      try {
        let date;
        if (dateValue.toDate) {
          // Firestore Timestamp 객체
          date = dateValue.toDate();
        } else if (dateValue.seconds) {
          // Timestamp 객체 (seconds 필드)
          date = new Date(dateValue.seconds * 1000);
        } else if (typeof dateValue === 'string' || typeof dateValue === 'number') {
          // 문자열이나 숫자
          date = new Date(dateValue);
        } else {
          return 'N/A';
        }
        
        if (isNaN(date.getTime())) {
          return 'N/A';
        }
        
        return date.toLocaleString('ko-KR');
      } catch (error) {
        console.error('날짜 포맷팅 오류:', error, dateValue);
        return 'N/A';
      }
    }

    // 문의 내역 렌더링
    function formatDateTime(dt) {
      if (!dt) return '';
      let d;
      try {
        if (dt.toDate) {
          // Firestore Timestamp인 경우
          d = dt.toDate();
        } else if (dt.seconds) {
          // Timestamp 객체인 경우
          d = new Date(dt.seconds * 1000);
        } else if (typeof dt === 'string' || typeof dt === 'number') {
          d = new Date(dt);
        } else {
          return '';
        }
        if (isNaN(d.getTime())) return '';
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,'0');
        const day = String(d.getDate()).padStart(2,'0');
        const h = String(d.getHours()).padStart(2,'0');
        const min = String(d.getMinutes()).padStart(2,'0');
        return `${y}-${m}-${day} ${h}:${min}`;
      } catch (error) {
        console.error('날짜 포맷팅 오류:', error, dt);
        return '';
      }
    }
    async function renderHistory() {
      let history = [];
      
      try {
        // 1. Firebase에서 데이터 가져오기 시도
        const firebaseInquiries = await getInquiriesFromFirebase();
        if (firebaseInquiries.length > 0) {
          history = firebaseInquiries;
          console.log('Firebase에서 문의 데이터 사용');
        } else {
          // Firebase에 데이터가 없으면 localStorage에서 가져오기
          history = JSON.parse(localStorage.getItem('contact-history') || '[]');
          console.log('localStorage에서 문의 데이터 사용');
        }
      } catch (error) {
        console.error('Firebase 데이터 가져오기 실패:', error);
        // Firebase 실패 시 localStorage에서 가져오기
        history = JSON.parse(localStorage.getItem('contact-history') || '[]');
      }
      
      const ul = document.getElementById('contact-history');
      ul.innerHTML = '';
      if (history.length === 0) {
        ul.innerHTML = '<li class="text-gray-400">문의 내역이 없습니다.</li>';
        return;
      }
      history.forEach(inq => {
        // 답변 불러오기 (Firebase에서 adminResponse 확인)
        let answer = '';
        let answerDate = null;
        
        // Firebase에서 가져온 adminResponse 확인
        if (inq.adminResponse) {
          if (typeof inq.adminResponse === 'object' && inq.adminResponse !== null) {
            // 구조화된 답변 데이터
            answer = inq.adminResponse.answer || '';
          } else {
            // 기존 텍스트 답변
            answer = inq.adminResponse;
          }
        } else if (inq.answer) {
          // 기존 answer 필드
          answer = inq.answer;
        }
        
        // 답변일시 확인 (responseDate 또는 answeredAt)
        if (inq.responseDate) {
          answerDate = inq.responseDate;
        } else if (inq.answeredAt) {
          answerDate = inq.answeredAt;
        }
        
        // localStorage에서도 답변 확인 (호환성 유지)
        if (!answer) {
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('inquiry-')) {
              const obj = JSON.parse(localStorage.getItem(key));
              if (obj && obj.subject === inq.subject && obj.date === inq.date) {
                answer = obj.answer || '';
                break;
              }
            }
          }
        }
        
        let fileHtml = '';
        if (inq.file) {
          if (inq.file.startsWith('data:image/')) {
            fileHtml = `<div class='mb-2'><img src='${inq.file}' alt='첨부 이미지' class='max-h-32 rounded-xl border shadow w-full object-contain' /></div>`;
          } else {
            const fileName = inq.fileName || '첨부파일';
            fileHtml = `<div class='mb-2 text-gray-600'>첨부파일: <a href='${inq.file}' download='${fileName}' class='text-blue-600 underline'>${fileName}</a></div>`;
          }
        }
        
        // 문의일시 포맷팅
        const inquiryDate = inq.date || inq.createdAt;
        const inquiryDateStr = formatDateTime(inquiryDate);
        
        // 답변일시 포맷팅
        const answerDateStr = answerDate ? formatDateTime(answerDate) : '';
        
        ul.innerHTML += `
          <li class='p-4 bg-blue-50 rounded-xl shadow mb-2 min-w-0'>
            <div class='font-bold text-blue-700 mb-1'>${escapeHtml(inq.subject || inq.title || '')}</div>
            <div class='text-gray-700 mb-1 whitespace-pre-line'>${escapeHtml(inq.message || inq.content || '')}</div>
            ${fileHtml}
            <div class='text-xs text-gray-400 mb-2'>문의일시: ${inquiryDateStr}</div>
            <div class='mt-2 p-3 rounded bg-white border'>
              <span class='font-bold text-blue-700'>답변</span><br>
              <span class='text-gray-800'>${answer ? escapeHtml(answer) : '<span class="text-gray-400">답변 대기중</span>'}</span>
              ${answerDateStr ? `<div class='text-xs text-gray-400 mt-2'>답변일시: ${answerDateStr}</div>` : ''}
            </div>
            <div class='mt-4'>
              <div class='font-bold text-blue-700 mb-2'>추가 댓글</div>
              <div class='comments-list'>${renderComments((inq.comments||[]))}</div>
              <form class='comment-form' data-subject="${escapeHtml(inq.subject || inq.title || '')}" data-date="${escapeHtml(inq.date || '')}">
                <div class='flex gap-2'>
                  <input type='text' name='comment' class='flex-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none' placeholder='댓글을 입력하세요' aria-label='댓글 입력' />
                  <button type='submit' class='px-4 py-2 bg-emerald-500 text-white rounded-lg font-bold hover:bg-emerald-600 transition' aria-label='댓글 추가'>등록</button>
                </div>
              </form>
            </div>
            <button class='mt-2 py-1 px-3 bg-red-500 text-white rounded font-bold hover:bg-red-600 transition' aria-label='문의 삭제' onclick='deleteInquiry(${JSON.stringify(inq.subject || inq.title || '')}, ${JSON.stringify(inq.date || '')})'>삭제</button>
          </li>
        `;
      });
    }
    renderHistory();
    
    // 실시간 댓글 업데이트 타이머 (3초마다)
    setInterval(updateCommentsInRealTime, 3000);
    
    document.addEventListener('submit', function(e) {
      if (e.target.classList.contains('comment-form')) {
        e.preventDefault();
        const subject = e.target.getAttribute('data-subject');
        const date = e.target.getAttribute('data-date');
        const input = e.target.querySelector('input[name="comment"]');
        const text = input.value.trim();
        if (!text) return false;
        let history = JSON.parse(localStorage.getItem('contact-history') || '[]');
        let found = null, foundIdx = -1;
        for (let i = 0; i < history.length; i++) {
          if (history[i].subject === subject && history[i].date === date) {
            found = history[i];
            foundIdx = i;
            break;
          }
        }
        if (!found) return false;
        // inquiry-에서 comments 동기화
        let inquiryKey = null;
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key.startsWith('inquiry-')) {
            const obj = JSON.parse(localStorage.getItem(key));
            if (obj && obj.subject === subject && obj.date === date) {
              inquiryKey = key;
              break;
            }
          }
        }
        if (!inquiryKey) return false;
        const author = (JSON.parse(localStorage.getItem('user')||'{}').name) || '회원';
        const inquiry = JSON.parse(localStorage.getItem(inquiryKey));
        // localStorage 댓글 저장 제거 - Firebase 전용
        console.log('✅ Firebase에서 댓글 업데이트');
        // 즉시 렌더링 갱신
        renderHistory();
        // 입력 필드 초기화
        input.value = '';
        return false;
      }
    });
  </script>
