name: Deploy Firestore Rules

on:
  push:
    branches: [main, master]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-firestore-rules.yml'
  workflow_dispatch:

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Deploy Firestore rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -e
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/sa.json"
            export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
            npx firebase-tools deploy --only firestore:rules --project pricehunter-99a1b --non-interactive
          elif [ -n "$FIREBASE_TOKEN" ]; then
            npx firebase-tools deploy --only firestore:rules --project pricehunter-99a1b --token "$FIREBASE_TOKEN" --non-interactive
          else
            echo "Missing FIREBASE_TOKEN or FIREBASE_SERVICE_ACCOUNT_JSON secret."
            exit 1
          fi
